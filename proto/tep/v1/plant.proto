syntax = "proto3";
package tep.v1;

option go_package = "github.com/Green-Cinnamon-Labs/tep-operator/internal/grpc/gen/tepv1;tepv1";

// ─── Serviço principal ─────────────────────────────────────────────────────────
// A planta expõe apenas RPCs de LEITURA + ajuste de parâmetros.
// Não permite criar/remover controladores nem controlar distúrbios.

service PlantService {
  rpc StreamMetrics(StreamMetricsRequest) returns (stream PlantMetrics);
  rpc GetPlantStatus(GetPlantStatusRequest) returns (PlantStatus);
  rpc ListControllers(ListControllersRequest) returns (ListControllersResponse);
  rpc UpdateController(UpdateControllerRequest) returns (UpdateControllerResponse);
}

// ─── Métricas e status ─────────────────────────────────────────────────────────

message StreamMetricsRequest {
  double interval_ms = 1;
}

message PlantMetrics {
  double t_h = 1;
  repeated double xmeas = 2;
  repeated double xmv = 3;
  repeated Alarm alarms = 4;
  double deriv_norm = 5;
  bool isd_active = 6;
}

message Alarm {
  string variable = 1;
  string condition = 2;
  bool active = 3;
}

message GetPlantStatusRequest {}

message PlantStatus {
  PlantMetrics metrics = 1;
  repeated ControllerInfo controllers = 2;
  repeated uint32 active_idv = 3;
}

// ─── Controladores ─────────────────────────────────────────────────────────────

message ControllerInfo {
  string id = 1;
  string controller_type = 2;
  uint32 xmeas_index = 3;
  uint32 xmv_index = 4;
  double kp = 5;
  double ki = 6;
  double kd = 7;
  double setpoint = 8;
  double bias = 9;
  bool enabled = 10;
  double current_measurement = 11;
  double current_output = 12;
  double error = 13;
}

message ListControllersRequest {}

message ListControllersResponse {
  repeated ControllerInfo controllers = 1;
}

message UpdateControllerRequest {
  string id = 1;
  optional double kp = 2;
  optional double ki = 3;
  optional double kd = 4;
  optional double setpoint = 5;
  optional double bias = 6;
  optional bool enabled = 7;
}

message UpdateControllerResponse {
  bool success = 1;
  string message = 2;
  ControllerInfo controller = 3;
}
