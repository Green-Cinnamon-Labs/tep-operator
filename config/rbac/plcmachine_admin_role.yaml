# This rule is not used by the project tep-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over infrastructure.greenlabs.io.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: tep-operator
    app.kubernetes.io/managed-by: kustomize
  name: plcmachine-admin-role
rules:
- apiGroups:
  - infrastructure.greenlabs.io
  resources:
  - plcmachines
  verbs:
  - '*'
- apiGroups:
  - infrastructure.greenlabs.io
  resources:
  - plcmachines/status
  verbs:
  - get
