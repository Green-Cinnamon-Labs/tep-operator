---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: plcmachines.infrastructure.greenlabs.io
spec:
  group: infrastructure.greenlabs.io
  names:
    kind: PLCMachine
    listKind: PLCMachineList
    plural: plcmachines
    singular: plcmachine
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.plantAddress
      name: Plant
      type: string
    - format: float
      jsonPath: .status.plantTime
      name: Time (h)
      type: number
    - jsonPath: .status.isdActive
      name: ISD
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          PLCMachine is the Schema for the plcmachines API.
          It represents a supervisory controller that monitors a TEP plant via gRPC.
          The spec defines a SUPERVISORY POLICY — operating ranges and response rules.
          The status is the operator's MEMORY — last readings, trends, and actions taken.
          The reconciler loop: Observe → Evaluate → Decide → Act → Record.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the supervisory policy
            properties:
              monitoringInterval:
                description: monitoringInterval configures the adaptive polling frequency.
                properties:
                  baseMs:
                    default: 2000
                    description: baseMs is the polling interval when the plant is
                      stable (ms).
                    format: int32
                    minimum: 100
                    type: integer
                  transientMs:
                    default: 200
                    description: |-
                      transientMs is the polling interval during transients (ms).
                      Used when the operator detects rapid changes in XMEAS values.
                    format: int32
                    minimum: 50
                    type: integer
                type: object
              operatingRanges:
                description: |-
                  operatingRanges defines acceptable limits for plant variables (XMEAS).
                  The operator monitors these and triggers response rules when violated.
                items:
                  description: |-
                    OperatingRange defines an acceptable range for a plant measurement (XMEAS).
                    When the measured value exits this range, the operator evaluates response rules.
                  properties:
                    max:
                      description: max is the upper acceptable limit. Above this triggers
                        "above_max".
                      type: number
                    min:
                      description: min is the lower acceptable limit. Below this triggers
                        "below_min".
                      type: number
                    name:
                      description: |-
                        name is a human-readable identifier for this range (e.g. "reactor_pressure").
                        Referenced by ResponseRule.watchRef.
                      type: string
                    xmeasIndex:
                      description: |-
                        xmeasIndex selects which process measurement to monitor (0-based).
                        Maps to XMEAS(index+1) in TEP nomenclature.
                      format: int32
                      maximum: 40
                      minimum: 0
                      type: integer
                  required:
                  - max
                  - min
                  - name
                  - xmeasIndex
                  type: object
                type: array
              plantAddress:
                description: |-
                  plantAddress is the gRPC endpoint of the plant service
                  (e.g. "te-plant.default.svc:50051").
                type: string
              responseRules:
                description: |-
                  responseRules defines what the operator does when a variable exits
                  its acceptable range. Each rule maps a condition to a controller action.
                items:
                  description: |-
                    ResponseRule defines what the operator does when a variable exits its range.
                    This is a supervisory decision: "if reactor pressure exceeds max, increase
                    the gain of the pressure controller".
                  properties:
                    adjustValue:
                      description: |-
                        adjustValue is the new value to set for the parameter.
                        For "enabled", use 1.0 (true) or 0.0 (false).
                      type: number
                    condition:
                      description: 'condition is when this rule fires: "above_max"
                        or "below_min".'
                      enum:
                      - above_max
                      - below_min
                      type: string
                    controllerID:
                      description: |-
                        controllerID is the ID of the controller to adjust on the plant.
                        Must match an existing controller returned by ListControllers.
                      type: string
                    name:
                      description: name is a human-readable identifier for this rule.
                      type: string
                    parameter:
                      description: parameter is which controller parameter to change.
                      enum:
                      - kp
                      - ki
                      - kd
                      - setpoint
                      - bias
                      - enabled
                      type: string
                    watchRef:
                      description: watchRef references an OperatingRange by name.
                      type: string
                  required:
                  - adjustValue
                  - condition
                  - controllerID
                  - name
                  - parameter
                  - watchRef
                  type: object
                type: array
            required:
            - plantAddress
            type: object
          status:
            description: status is the operator's memory of plant state
            properties:
              conditions:
                description: |-
                  conditions are standard Kubernetes status conditions.
                  Types: "Available", "Progressing", "Degraded".
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              isdActive:
                description: isdActive is true when the plant triggered an emergency
                  shutdown.
                type: boolean
              lastAction:
                description: |-
                  lastAction records the most recent supervisory action taken.
                  Nil if the operator has not yet intervened.
                properties:
                  controllerID:
                    description: controllerID is the controller that was adjusted.
                    type: string
                  parameter:
                    description: parameter is which parameter was changed.
                    type: string
                  ruleName:
                    description: ruleName is which ResponseRule triggered this action.
                    type: string
                  timestamp:
                    description: timestamp is when the action was executed.
                    format: date-time
                    type: string
                  value:
                    description: value is the value that was set.
                    type: number
                required:
                - controllerID
                - parameter
                - ruleName
                - timestamp
                - value
                type: object
              lastReconcileTime:
                description: lastReconcileTime is when the operator last read the
                  plant.
                format: date-time
                type: string
              observation:
                description: |-
                  observation is a passive full snapshot of all plant signals.
                  Populated every reconcile cycle regardless of policy.
                  Contains all 41 XMEAS (continuous + analyzers) and all 12 XMV.
                properties:
                  derivNorm:
                    description: |-
                      derivNorm is the norm of the state derivative vector.
                      Near zero means steady state; high values indicate transient.
                    type: number
                  xmeas:
                    description: |-
                      xmeas contains all 41 process measurements (0-indexed).
                      XMEAS(1..22) are continuous; XMEAS(23..41) are sampled analyzers.
                    items:
                      type: number
                    type: array
                  xmv:
                    description: xmv contains all 12 manipulated variables (0-indexed).
                    items:
                      type: number
                    type: array
                type: object
              phase:
                description: phase summarizes the plant state as perceived by the
                  operator.
                enum:
                - Pending
                - Stable
                - Transient
                - Alarm
                - Shutdown
                type: string
              plantTime:
                description: plantTime is the simulation clock in hours.
                type: number
              variables:
                description: |-
                  variables stores the operator's memory of each monitored XMEAS.
                  Includes current value, previous value, trend, and in-range flag.
                  Only populated for variables declared in spec.operatingRanges.
                items:
                  description: VariableStatus is the operator's memory of one plant
                    measurement.
                  properties:
                    inRange:
                      description: inRange is true when the value is within the OperatingRange
                        limits.
                      type: boolean
                    name:
                      description: name matches OperatingRange.Name.
                      type: string
                    previousValue:
                      description: |-
                        previousValue is the reading from the last reconcile cycle.
                        Used to compute trend.
                      type: number
                    trend:
                      description: 'trend indicates the direction: Rising, Falling,
                        or Stable.'
                      enum:
                      - Rising
                      - Falling
                      - Stable
                      type: string
                    value:
                      description: value is the latest reading.
                      type: number
                    xmeasIndex:
                      description: xmeasIndex is which XMEAS this corresponds to.
                      format: int32
                      type: integer
                  required:
                  - inRange
                  - name
                  - value
                  - xmeasIndex
                  type: object
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
